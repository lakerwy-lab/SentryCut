services:
  api:
    # FastAPI 后端：负责素材管理、索引、分镜规划、TTS 和 FFmpeg 渲染。
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
    image: sentrycut-api:latest
    container_name: sentrycut-api
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-gemini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-gemini-embedding-2-preview}
      DEFAULT_TTS_VOICE: ${DEFAULT_TTS_VOICE:-zh-CN-XiaoxiaoNeural}
      ALLOW_PLANNER_FALLBACK: ${ALLOW_PLANNER_FALLBACK:-1}
      ALLOW_TTS_FALLBACK: ${ALLOW_TTS_FALLBACK:-1}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SENTRYSEARCH_CHUNK_DURATION: ${SENTRYSEARCH_CHUNK_DURATION:-30}
      SENTRYSEARCH_CHUNK_OVERLAP: ${SENTRYSEARCH_CHUNK_OVERLAP:-5}
      SENTRYSEARCH_TARGET_RESOLUTION: ${SENTRYSEARCH_TARGET_RESOLUTION:-480}
      SENTRYSEARCH_TARGET_FPS: ${SENTRYSEARCH_TARGET_FPS:-5}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # 这些目录是运行态数据，必须挂载到宿主机，发版/重建容器时不能丢。
      - ./ai-video-mixer-api/materials:/app/ai-video-mixer-api/materials
      - ./ai-video-mixer-api/clips:/app/ai-video-mixer-api/clips
      - ./ai-video-mixer-api/output:/app/ai-video-mixer-api/output
      - ./ai-video-mixer-api/data:/app/ai-video-mixer-api/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    # Nginx 托管 Vite 构建产物，并把 /api 与 /static 代理给后端容器。
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    image: sentrycut-web:latest
    container_name: sentrycut-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:80"
